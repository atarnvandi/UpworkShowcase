<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CardecksCRM</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 13px;
        }

        :root {
            --bg-a: #b8ceee;
            --bg-b: #cde0fa;
            --bg-c: #e2d8f5;
            --surface: rgba(255, 255, 255, 0.58);
            --surface2: rgba(255, 255, 255, 0.36);
            --border: rgba(255, 255, 255, 0.78);
            --border2: rgba(180, 200, 240, 0.22);
            --ink: #16192a;
            --ink2: #46506e;
            --ink3: #8a93b0;
            --accent: #2d6fe8;
            --accent2: #5b8ffa;
            --green: #1a9a6a;
            --green-bg: rgba(26, 154, 106, 0.13);
            --orange: #d96020;
            --orange-bg: rgba(217, 96, 32, 0.12);
            --red: #d93020;
            --red-bg: rgba(217, 48, 32, 0.10);
            --blue-bg: rgba(45, 111, 232, 0.12);
            --shadow-sm: 0 2px 12px rgba(30, 50, 100, 0.08);
            --shadow-md: 0 8px 40px rgba(30, 50, 100, 0.14);
            --shadow-lg: 0 24px 64px rgba(30, 50, 100, 0.2);
            --r: 18px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 45%, var(--bg-c) 100%);
            background-attachment: fixed;
            color: var(--ink);
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 65% 55% at 15% 15%, rgba(110, 155, 255, 0.26) 0%, transparent 70%),
                radial-gradient(ellipse 55% 65% at 85% 75%, rgba(185, 145, 255, 0.2) 0%, transparent 70%),
                radial-gradient(ellipse 45% 45% at 65% 8%, rgba(255, 255, 255, 0.32) 0%, transparent 60%);
        }

        .page-root {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            position: relative;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
        }

        .topbar-logo {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--ink);
        }

        .topbar-logo .crm {
            color: var(--accent);
        }

        .topbar-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-meta-item {
            font-size: 11px;
            color: var(--ink3);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .topbar-meta-item strong {
            color: var(--ink2);
            font-weight: 600;
        }

        .topbar-sep {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.5);
        }

        /* CONTENT GRID */
        .content-area {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 0;
            flex: 1;
            padding: 20px 28px 32px;
            align-items: start;
            min-height: 0;
        }

        /* DECK COL */
        .deck-col {
            position: sticky;
            top: 20px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding-right: 24px;
        }

        .folder-container {
            display: flex;
            flex-direction: column;
            filter: drop-shadow(0 8px 32px rgba(30, 50, 100, 0.13));
        }

        .folder-tab {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: rgba(255, 255, 255, 0.62);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.88);
            border-bottom: none;
            border-radius: 16px 16px 0 0;
            padding: 10px 16px;
            position: relative;
            z-index: 2;
        }

        .folder-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.2px;
            color: var(--ink);
            flex-shrink: 0;
        }

        .folder-tab-right {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }

        .folder-body-deck {
            background: rgba(255, 255, 255, 0.38);
            backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.82);
            border-radius: 0 0 16px 16px;
            padding: 20px 16px 16px;
            position: relative;
            z-index: 1;
        }

        .folder-body-table {
            background: rgba(255, 255, 255, 0.42);
            backdrop-filter: blur(28px) saturate(170%);
            border: 1px solid rgba(255, 255, 255, 0.82);
            border-radius: 0 0 16px 16px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            box-shadow: 0 2px 0 rgba(255, 255, 255, 0.6) inset;
            position: relative;
            z-index: 1;
            cursor: grab;
            max-height: calc(100vh - 168px);
        }

        .folder-body-table:active {
            cursor: grabbing;
        }

        /* BUTTONS */
        .folder-filter-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11.5px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            backdrop-filter: blur(12px);
            color: var(--ink2);
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.18s;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
        }

        .folder-filter-btn:hover {
            background: rgba(255, 255, 255, 0.65);
            color: var(--ink);
        }

        .folder-filter-btn.active {
            background: rgba(45, 111, 232, 0.15);
            border-color: rgba(45, 111, 232, 0.35);
            color: var(--accent);
        }

        .topbar-btn {
            font-size: 11.5px;
            font-weight: 600;
            padding: 5px 13px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            backdrop-filter: blur(12px);
            color: var(--ink2);
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.18s;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
            white-space: nowrap;
        }

        .topbar-btn:hover {
            background: rgba(255, 255, 255, 0.65);
            color: var(--ink);
        }

        .topbar-btn.primary {
            background: rgba(45, 111, 232, 0.15);
            border-color: rgba(45, 111, 232, 0.3);
            color: var(--accent);
        }

        .topbar-btn.primary:hover {
            background: rgba(45, 111, 232, 0.25);
        }

        /* SEARCH */
        .search-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            border-radius: 8px;
            padding: 5px 11px;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
        }

        .search-box input {
            background: none;
            border: none;
            outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12px;
            color: var(--ink);
            width: 140px;
            font-weight: 500;
        }

        .search-box input::placeholder {
            color: var(--ink3);
            font-weight: 400;
        }

        .search-icon {
            font-size: 12px;
            color: var(--ink3);
        }

        .table-count {
            font-size: 10.5px;
            color: var(--ink3);
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
            padding: 3px 11px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* TABLE COL */
        .table-col {
            min-width: 0;
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            padding-left: 24px;
        }

        /* TABLE */
        table {
            width: 100%;
            min-width: 860px;
            border-collapse: collapse;
            position: relative;
            z-index: 1;
        }

        thead tr {
            border-bottom: 1px solid rgba(180, 200, 240, 0.25);
        }

        thead th {
            font-size: 9px;
            font-weight: 700;
            color: var(--ink3);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 11px 14px;
            text-align: left;
            white-space: nowrap;
            position: sticky;
            top: 0;
            background: rgba(235, 242, 255, 0.75);
            backdrop-filter: blur(12px);
        }

        tbody tr {
            border-bottom: 1px solid rgba(180, 200, 240, 0.14);
            transition: background 0.15s;
            cursor: pointer;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.32);
        }

        tbody tr.row-active {
            background: rgba(45, 111, 232, 0.07);
        }

        tbody tr.row-hidden {
            display: none;
        }

        tbody td {
            padding: 9px 14px;
            font-size: 12px;
            color: var(--ink);
            vertical-align: middle;
            white-space: nowrap;
        }

        .td-contact {
            display: flex;
            flex-direction: column;
        }

        .td-contact .name {
            font-size: 12px;
            font-weight: 600;
            color: var(--ink);
        }

        .td-contact .sub {
            font-size: 10.5px;
            color: var(--ink3);
            margin-top: 1px;
        }

        .td-mono {
            font-family: 'DM Mono', monospace;
            font-size: 10.5px;
            color: var(--ink2);
        }

        .td-deal {
            font-size: 13px;
            font-weight: 700;
            color: var(--ink);
        }

        .td-deal.muted {
            color: var(--ink3);
            font-weight: 400;
        }

        .td-progress {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .td-bar {
            flex: 1;
            height: 3px;
            background: rgba(138, 147, 176, 0.15);
            border-radius: 99px;
            overflow: hidden;
            min-width: 40px;
        }

        .td-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .td-fill.green {
            background: linear-gradient(90deg, var(--green), #3de0a0);
        }

        .td-fill.low {
            background: linear-gradient(90deg, var(--ink3), rgba(138, 147, 176, 0.4));
        }

        .td-pct {
            font-family: 'DM Mono', monospace;
            font-size: 10.5px;
            color: var(--ink2);
            min-width: 28px;
            text-align: right;
        }

        .td-notes {
            font-size: 11px;
            color: var(--ink3);
            font-style: italic;
            max-width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ⋯ CONTEXT MENU */
        .action-btn {
            background: none;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink3);
            font-size: 14px;
            transition: all 0.12s;
            position: relative;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.55);
            color: var(--ink);
        }

        .ctx-menu {
            position: absolute;
            right: 0;
            top: 100%;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(30, 50, 100, 0.16);
            padding: 4px;
            min-width: 120px;
            animation: panelIn 0.15s cubic-bezier(0.34, 1.3, 0.64, 1);
        }

        .ctx-item {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 10px;
            border-radius: 7px;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--ink2);
            cursor: pointer;
            transition: background 0.12s;
            white-space: nowrap;
        }

        .ctx-item:hover {
            background: rgba(45, 111, 232, 0.08);
            color: var(--accent);
        }

        .ctx-item.danger:hover {
            background: rgba(217, 48, 32, 0.08);
            color: var(--red);
        }

        /* BADGE */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .badge::before {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        .badge.prospect {
            background: var(--blue-bg);
            color: var(--accent);
        }

        .badge.prospect::before {
            background: var(--accent);
        }

        .badge.lead {
            background: var(--orange-bg);
            color: var(--orange);
        }

        .badge.lead::before {
            background: var(--orange);
        }

        .badge.customer {
            background: var(--green-bg);
            color: var(--green);
        }

        .badge.customer::before {
            background: var(--green);
        }

        .badge.inactive {
            background: rgba(138, 147, 176, 0.12);
            color: var(--ink3);
        }

        .badge.inactive::before {
            background: var(--ink3);
        }

        /* CARD STACK */
        .stack-scene {
            position: relative;
        }

        .stack-ghost {
            position: absolute;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.80);
            border-radius: var(--r);
            pointer-events: none;
        }

        .stack-ghost-2 {
            top: 0;
            transform: translateY(14px) scale(0.935);
            transform-origin: 50% bottom;
            z-index: 1;
            opacity: 0.55;
            height: 60px;
        }

        .stack-ghost-1 {
            top: 0;
            transform: translateY(7px) scale(0.967);
            transform-origin: 50% bottom;
            z-index: 2;
            opacity: 0.75;
            height: 60px;
        }

        .card {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(34px) saturate(180%);
            -webkit-backdrop-filter: blur(34px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.92);
            border-radius: var(--r);
            box-shadow: 0 2px 0 rgba(255, 255, 255, 0.92) inset, 0 -1px 0 rgba(200, 218, 255, 0.3) inset, var(--shadow-lg);
            overflow: hidden;
            will-change: transform, opacity;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 5%, rgba(255, 255, 255, 0.97) 50%, transparent 95%);
            pointer-events: none;
            z-index: 10;
        }

        .card.anim-exit {
            animation: cardExit 0.38s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }

        .card.anim-enter {
            animation: cardEnter 0.38s cubic-bezier(0.34, 1.1, 0.64, 1) forwards;
        }

        @keyframes cardExit {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            40% {
                transform: translateY(-18px) scale(1.02);
                opacity: 0.8;
            }

            100% {
                transform: translateY(60px) scale(0.88);
                opacity: 0;
            }
        }

        @keyframes cardEnter {
            0% {
                transform: translateY(30px) scale(0.92);
                opacity: 0;
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes panelIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes confirmIn {
            from {
                opacity: 0;
                transform: scale(0.94);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* CARD CONTENT */
        .card-avatar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px 11px;
            border-bottom: 1px solid var(--border2);
        }

        .avatar-info {
            flex: 1;
            min-width: 0;
        }

        .avatar-name {
            font-size: 13.5px;
            font-weight: 700;
            letter-spacing: -0.2px;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .avatar-company {
            font-size: 11px;
            color: var(--ink3);
            margin-top: 1px;
        }

        .card-idx-badge {
            font-family: 'DM Mono', monospace;
            font-size: 9.5px;
            color: var(--ink3);
            background: var(--surface2);
            border: 1px solid var(--border2);
            padding: 2px 7px;
            border-radius: 7px;
            flex-shrink: 0;
        }

        .card-section {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border2);
        }

        .card-section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--ink3);
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .section-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
        }

        .card-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .field {
            padding: 4px 0;
        }

        .field:nth-child(odd) {
            padding-right: 8px;
        }

        .field-label {
            font-size: 10px;
            color: var(--ink3);
            font-weight: 500;
            margin-bottom: 1px;
        }

        .field-value {
            font-size: 11.5px;
            color: var(--ink);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .field-value a {
            color: var(--accent);
            text-decoration: none;
        }

        .field-value.serif {
            font-size: 14px;
            font-weight: 700;
        }

        .field-value.accent {
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
        }

        .notes-italic {
            font-size: 11.5px;
            color: var(--ink2);
            line-height: 1.65;
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .mini-progress {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
        }

        .mini-bar {
            flex: 1;
            height: 3px;
            background: rgba(138, 147, 176, 0.18);
            border-radius: 99px;
            overflow: hidden;
        }

        .mini-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .mini-fill.green {
            background: linear-gradient(90deg, var(--green), #3de0a0);
        }

        .mini-fill.low {
            background: linear-gradient(90deg, var(--ink3), rgba(138, 147, 176, 0.4));
        }

        .card-actions {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            border-top: 1px solid var(--border2);
        }

        .card-act-btn {
            flex: 1;
            padding: 7px 0;
            border-radius: 9px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 11.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.17s;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--ink2);
            backdrop-filter: blur(8px);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-act-btn:hover {
            background: rgba(255, 255, 255, 0.65);
            color: var(--ink);
        }

        .card-act-btn.wa {
            background: rgba(37, 211, 102, 0.1);
            border-color: rgba(37, 211, 102, 0.3);
            color: #128c47;
        }

        .card-act-btn.wa:hover {
            background: rgba(37, 211, 102, 0.2);
        }

        .card-act-btn.email {
            background: rgba(45, 111, 232, 0.1);
            border-color: rgba(45, 111, 232, 0.28);
            color: var(--accent);
        }

        .card-act-btn.email:hover {
            background: rgba(45, 111, 232, 0.2);
        }

        /* DECK CONTROLS */
        .deck-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            width: 100%;
        }

        .deck-dots {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 260px;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            flex-shrink: 0;
        }

        .dot.active {
            width: 18px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.92);
            border-color: transparent;

            { name: 'Wahyu Santoso', company: 'PT Delta Persada', email: 'wahyu@deltapersada.id', phone: '6282788990011', status: 'prospect', statusLabel: 'Prospect', source: 'Cold Call', assigned: 'Dewi Sartika', lastContact: '9 Mar 2026', deal: 'Rp 33.000.000', dealShort: 'Rp 33 jt', prob: 40, probClass: '', notes: 'Receptive cold call. Sent intro deck. Follow up call booked for 14 Mar.' },
        ];

        // ── LOCALSTORAGE PERSISTENCE ──
        const STORAGE_KEY = 'cardecks_contacts';

        function loadContacts() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_CONTACTS));
            } catch (e) {
                return JSON.parse(JSON.stringify(DEFAULT_CONTACTS));
            }
        }

        function saveContacts() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts)); } catch (e) { }
        }

        // ── STATE ──
        let contacts = loadContacts();
        let currentIdx = 0;
        let isAnimating = false;
        let activeFilters = { status: [], assigned: [], source: [] };
        let searchQuery = '';

        // ── DOM REFS ──
        const theCard = document.getElementById('theCard');
        const ghost1 = document.getElementById('ghost1');
        const ghost2 = document.getElementById('ghost2');
        const scene = document.getElementById('stackScene');
        const dotsWrap = document.getElementById('deckDots');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const counterEl = document.getElementById('deckCounter');
        const tableBody = document.getElementById('tableBody');

        // ── CARD HTML ──
        function cardHTML(i) {
            const c = contacts[i];
            return `
    <div class="card-avatar-row">
        <div class="avatar-info">
            <div class="avatar-name">${esc(c.name)}</div>
            <div class="avatar-company">${esc(c.company)}</div>
        </div>
        <span class="card-idx-badge">#${String(i + 1).padStart(2, '0')}</span>
    </div>
    <div class="card-section">
        <div class="section-title"><div class="section-dot"></div>Contact Info</div>
        <div class="card-fields">
            <div class="field"><div class="field-label">Email</div><div class="field-value"><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></div></div>
            <div class="field"><div class="field-label">Phone</div><div class="field-value"><a href="tel:+${esc(c.phone)}">+${esc(c.phone)}</a></div></div>
        </div>
    </div>
    <div class="card-section">
        <div class="section-title"><div class="section-dot"></div>Lead Status</div>
        <div class="card-fields">
            <div class="field"><div class="field-label">Status</div><div class="field-value"><span class="badge ${c.status}">${esc(c.statusLabel)}</span></div></div>
            <div class="field"><div class="field-label">Source</div><div class="field-value">${esc(c.source)}</div></div>
            <div class="field"><div class="field-label">Assigned To</div><div class="field-value">${esc(c.assigned)}</div></div>
            <div class="field"><div class="field-label">Last Contact</div><div class="field-value">${esc(c.lastContact)}</div></div>
        </div>
    </div>
    <div class="card-section">
        <div class="section-title"><div class="section-dot"></div>Deal Value</div>
        <div class="card-fields">
            <div class="field"><div class="field-label">Estimated Deal</div><div class="field-value serif">${esc(c.deal)}</div></div>
            <div class="field">
                <div class="field-label">Probability</div>
                <div class="field-value accent">${c.prob}%</div>
                <div class="mini-progress"><div class="mini-bar"><div class="mini-fill ${c.probClass}" style="width:${c.prob}%"></div></div></div>
            </div>
        </div>
    </div>
    <div class="card-section">
        <div class="section-title"><div class="section-dot"></div>Notes</div>
        <p class="notes-italic">${esc(c.notes)}</p>
    </div>
    <div class="card-actions">
        <button class="card-act-btn" onclick="event.stopPropagation();openEditModal(${i})">Edit</button>
        <a class="card-act-btn wa" href="https://wa.me/${esc(c.phone)}" target="_blank" onclick="event.stopPropagation()">WhatsApp</a>
        <a class="card-act-btn email" href="https://mail.google.com/mail/?view=cm&fs=1&to=${esc(c.email)}" target="_blank" onclick="event.stopPropagation()">Email</a>
    </div>`;
        }

        function esc(str) {
            return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ── GHOST + SCENE HEIGHT ──
        function syncGhosts() {
            const h = theCard.offsetHeight;
            ghost1.style.height = h + 'px';
            ghost2.style.height = h + 'px';
            scene.style.height = (h + 20) + 'px';
        }

        // ── RENDER ──
        function renderCard() {
            theCard.innerHTML = cardHTML(currentIdx);
            requestAnimationFrame(syncGhosts);
        }

        // ── UI SYNC ──
        function updateUI() {
            counterEl.textContent = `${currentIdx + 1} / ${contacts.length}`;
            btnPrev.disabled = currentIdx === 0;
            btnNext.disabled = currentIdx === contacts.length - 1;
            Array.from(dotsWrap.children).forEach((d, i) => d.classList.toggle('active', i === currentIdx));
            Array.from(tableBody.querySelectorAll('tr')).forEach(tr => tr.classList.toggle('row-active', parseInt(tr.dataset.idx) === currentIdx));
            const activeRow = tableBody.querySelector('tr.row-active');
            if (activeRow) activeRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function updateTopbarMeta() {
            const total = contacts.length;
            const prospects = contacts.filter(c => c.status === 'prospect').length;
            const customers = contacts.filter(c => c.status === 'customer').length;
            document.getElementById('topbarMeta').innerHTML = `
        <div class="topbar-meta-item"><strong>${total}</strong> contacts</div>
        <div class="topbar-sep"></div>
        <div class="topbar-meta-item"><strong>${prospects}</strong> prospects</div>
        <div class="topbar-sep"></div>
        <div class="topbar-meta-item"><strong>${customers}</strong> customers</div>`;
        }

        // ── NAVIGATION ──
        function goTo(newIdx) {
            if (isAnimating || newIdx === currentIdx) return;
            if (newIdx < 0 || newIdx >= contacts.length) return;
            isAnimating = true;
            theCard.classList.add('anim-exit');
            theCard.addEventListener('animationend', () => {
                theCard.classList.remove('anim-exit');
                currentIdx = newIdx;
                renderCard();
                updateUI();
                theCard.classList.add('anim-enter');
                theCard.addEventListener('animationend', () => {
                    theCard.classList.remove('anim-enter');
                    isAnimating = false;
                }, { once: true });
            }, { once: true });
        }

        function goNext() { goTo(currentIdx + 1); }
        function goPrev() { goTo(currentIdx - 1); }

        // ── DOTS ──
        function buildDots() {
            dotsWrap.innerHTML = '';
            contacts.forEach((_, i) => {
                const d = document.createElement('div');
                d.className = 'dot';
                d.onclick = () => goTo(i);
                dotsWrap.appendChild(d);
            });
        }

        // ── TABLE ──
        function buildTable() {
            tableBody.innerHTML = '';
            contacts.forEach((c, i) => {
                const tr = document.createElement('tr');
                tr.dataset.idx = i;
                tr.dataset.status = c.status;
                tr.dataset.assigned = c.assigned;
                tr.dataset.source = c.source;
                tr.dataset.searchtext = `${c.name} ${c.company} ${c.email} ${c.phone} ${c.statusLabel} ${c.assigned} ${c.source} ${c.notes}`.toLowerCase();
                tr.onclick = () => goTo(i);
                tr.innerHTML = `
            <td><div class="td-contact"><div class="name">${esc(c.name)}</div><div class="sub">${esc(c.company)}</div></div></td>
            <td><span class="badge ${c.status}">${esc(c.statusLabel)}</span></td>
            <td class="td-mono">${esc(c.email)}</td>
            <td class="td-mono">+${esc(c.phone)}</td>
            <td style="color:var(--ink3);font-size:11px;font-weight:500">${esc(c.assigned)}</td>
            <td style="color:var(--ink3);font-size:11px">${esc(c.lastContact)}</td>
            <td style="color:var(--ink3);font-size:11px">${esc(c.source)}</td>
            <td class="td-deal ${c.deal === '—' ? 'muted' : ''}">${esc(c.dealShort)}</td>
            <td><div class="td-progress"><div class="td-bar"><div class="td-fill ${c.probClass}" style="width:${c.prob}%"></div></div><span class="td-pct">${c.prob}%</span></div></td>
            <td><div class="td-notes">${esc(c.notes)}</div></td>
            <td style="position:relative">
                <button class="action-btn" onclick="event.stopPropagation();toggleCtxMenu(event,${i})">⋯</button>
            </td>`;
                tableBody.appendChild(tr);
            });
            applyTableVisibility();
        }

        // ── CONTEXT MENU (⋯ button) ──
        let activeCtx = null;
        function toggleCtxMenu(e, idx) {
            closeCtxMenu();
            const btn = e.currentTarget;
            const menu = document.createElement('div');
            menu.className = 'ctx-menu';
            menu.innerHTML = `
        <div class="ctx-item" onclick="closeCtxMenu();openEditModal(${idx})">✏️ Edit</div>
        <div class="ctx-item danger" onclick="closeCtxMenu();confirmDelete(${idx})">🗑 Delete</div>`;
            btn.parentElement.appendChild(menu);
            activeCtx = menu;
            setTimeout(() => document.addEventListener('click', closeCtxMenu, { once: true }), 0);
        }
        function closeCtxMenu() {
            if (activeCtx) { activeCtx.remove(); activeCtx = null; }
        }

        // ── SEARCH & FILTER ──
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            applyTableVisibility();
        }

        function applyTableVisibility() {
            let visible = 0;
            Array.from(tableBody.querySelectorAll('tr')).forEach(tr => {
                const ok = (!searchQuery || tr.dataset.searchtext.includes(searchQuery))
                    && (activeFilters.status.length === 0 || activeFilters.status.includes(tr.dataset.status))
                    && (activeFilters.assigned.length === 0 || activeFilters.assigned.includes(tr.dataset.assigned))
                    && (activeFilters.source.length === 0 || activeFilters.source.includes(tr.dataset.source));
                tr.classList.toggle('row-hidden', !ok);
                if (ok) visible++;
            });
            document.getElementById('tableCount').textContent = `${visible} contact${visible !== 1 ? 's' : ''}`;
            document.getElementById('filterBtn').classList.toggle('active', Object.values(activeFilters).some(a => a.length > 0));
        }

        function toggleFilter() { document.getElementById('filterOverlay').classList.toggle('open'); }
        function handleOverlayClick(e) { if (e.target === document.getElementById('filterOverlay')) document.getElementById('filterOverlay').classList.remove('open'); }
        function toggleChip(chip) { chip.classList.toggle('selected'); }

        function applyFilters() {
            activeFilters = { status: [], assigned: [], source: [] };
            document.querySelectorAll('.chip.selected').forEach(chip => {
                const f = chip.dataset.filter;
                if (activeFilters[f]) activeFilters[f].push(chip.dataset.value);
            });
            applyTableVisibility();
            document.getElementById('filterOverlay').classList.remove('open');
        }

        function resetFilters() {
            activeFilters = { status: [], assigned: [], source: [] };
            document.querySelectorAll('.chip.selected').forEach(c => c.classList.remove('selected'));
            applyTableVisibility();
            document.getElementById('filterOverlay').classList.remove('open');
        }

        // Dynamically build assigned chips from unique assignees in contacts
        function rebuildAssignedChips() {
            const assignees = [...new Set(contacts.map(c => c.assigned).filter(Boolean))].sort();
            const wrap = document.getElementById('assignedChips');
            wrap.innerHTML = '';
            assignees.forEach(name => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.dataset.filter = 'assigned';
                chip.dataset.value = name;
                chip.textContent = name;
                chip.onclick = () => toggleChip(chip);
                wrap.appendChild(chip);
            });
        }

        // ── MODAL HELPERS ──
        function modalField(label, id, value, type = 'text', extra = '') {
            return `<div>
        <label class="mf-label">${label.toUpperCase()}</label>
        <input class="mf-input${type === 'number' ? ' mono' : ''}" id="${id}" type="${type}" value="${esc(value)}" ${extra} />
    </div>`;
        }

        function modalSelect(label, id, options, selected) {
            const opts = options.map(o => {
                const val = typeof o === 'object' ? o.value : o;
                const lbl = typeof o === 'object' ? o.label : o;
                return `<option value="${esc(val)}" ${val === selected ? 'selected' : ''}>${esc(lbl)}</option>`;
            }).join('');
            return `<div>
        <label class="mf-label">${label.toUpperCase()}</label>
        <select class="mf-select" id="${id}">${opts}</select>
    </div>`;
        }

        function getAssignees() {
            return [...new Set(contacts.map(c => c.assigned).filter(Boolean))].sort();
        }

        const STATUS_OPTIONS = [
            { value: 'prospect', label: 'Prospect' },
            { value: 'customer', label: 'Customer' },
            { value: 'lead', label: 'Lead' },
            { value: 'inactive', label: 'Inactive' },
        ];
        const STATUS_MAP = { prospect: 'Prospect', customer: 'Customer', lead: 'Lead', inactive: 'Inactive' };
        const SOURCES = ['Referral', 'Website', 'LinkedIn', 'Event', 'Cold Call'];

        function buildModalHTML(title, c, showDelete) {
            const assignees = getAssignees();
            if (assignees.length === 0) assignees.push('Andi Rahmat', 'Dewi Sartika');
            return `
    <div class="modal-box">
        <div class="modal-header">
            <span class="modal-title">${title}</span>
            <button class="modal-close" id="mClose">×</button>
        </div>
        <div class="modal-fields">
            ${modalField('Name', 'mName', c.name || '')}
            ${modalField('Company', 'mCompany', c.company || '')}
            ${modalField('Email', 'mEmail', c.email || '')}
            ${modalField('Phone', 'mPhone', c.phone || '')}
            ${modalField('Last Contact', 'mLastContact', c.lastContact || '')}
            ${modalField('Deal Value', 'mDeal', c.deal === '—' ? '' : (c.deal || ''))}
            ${modalSelect('Status', 'mStatus', STATUS_OPTIONS, c.status || 'prospect')}
            ${modalSelect('Assigned To', 'mAssigned', assignees, c.assigned || assignees[0])}
            ${modalSelect('Source', 'mSource', SOURCES, c.source || 'Referral')}
            ${modalField('Probability %', 'mProb', c.prob ?? 50, 'number', 'min="0" max="100"')}
            <div class="mf-full">
                <label class="mf-label">NOTES</label>
                <textarea class="mf-textarea" id="mNotes" rows="3">${esc(c.notes || '')}</textarea>
            </div>
        </div>
        <div class="modal-footer">
            ${showDelete ? `<button class="btn-modal btn-modal-delete" id="mDelete">Delete</button>` : ''}
            <button class="btn-modal btn-modal-cancel" id="mCancel">Cancel</button>
            <button class="btn-modal btn-modal-save" id="mSave">${title === 'Add Contact' ? 'Add Contact' : 'Save Changes'}</button>
        </div>
    </div>`;
        }

        function readModal(overlay) {
            const statusVal = overlay.querySelector('#mStatus').value;
            const probVal = Math.min(100, Math.max(0, parseInt(overlay.querySelector('#mProb').value) || 0));
            const dealRaw = overlay.querySelector('#mDeal').value.trim();
            const dealVal = dealRaw || '—';
            return {
                name: overlay.querySelector('#mName').value.trim(),
                company: overlay.querySelector('#mCompany').value.trim(),
                email: overlay.querySelector('#mEmail').value.trim(),
                phone: overlay.querySelector('#mPhone').value.trim().replace(/\D/g, ''),
                lastContact: overlay.querySelector('#mLastContact').value.trim(),
                deal: dealVal,
                dealShort: dealVal,
                status: statusVal,
                statusLabel: STATUS_MAP[statusVal],
                assigned: overlay.querySelector('#mAssigned').value,
                source: overlay.querySelector('#mSource').value,
                prob: probVal,
                probClass: probVal === 100 ? 'green' : probVal <= 20 ? 'low' : '',
                notes: overlay.querySelector('#mNotes').value.trim(),
            };
        }

        function createOverlay(html) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = html;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
            return overlay;
        }

        // ── EDIT MODAL ──
        function openEditModal(idx) {
            const overlay = createOverlay(buildModalHTML('Edit Contact', contacts[idx], true));

            overlay.querySelector('#mClose').onclick = () => overlay.remove();
            overlay.querySelector('#mCancel').onclick = () => overlay.remove();

            overlay.querySelector('#mDelete').onclick = () => {
                overlay.remove();
                confirmDelete(idx);
            };

            overlay.querySelector('#mSave').onclick = () => {
                const nameEl = overlay.querySelector('#mName');
                if (!nameEl.value.trim()) { nameEl.classList.add('error'); nameEl.focus(); return; }
                contacts[idx] = { ...contacts[idx], ...readModal(overlay) };
                saveContacts();
                overlay.remove();
                fullRefresh(idx);
            };
        }

        // ── ADD MODAL ──
        function openAddModal() {
            const overlay = createOverlay(buildModalHTML('Add Contact', {}, false));

            overlay.querySelector('#mClose').onclick = () => overlay.remove();
            overlay.querySelector('#mCancel').onclick = () => overlay.remove();

            overlay.querySelector('#mSave').onclick = () => {
                const nameEl = overlay.querySelector('#mName');
                if (!nameEl.value.trim()) { nameEl.classList.add('error'); nameEl.focus(); return; }
                contacts.push(readModal(overlay));
                saveContacts();
                overlay.remove();
                fullRefresh(contacts.length - 1);
            };
        }

        // ── DELETE WITH CONFIRM ──
        function confirmDelete(idx) {
            const name = contacts[idx].name;
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
    <div class="confirm-box">
        <div class="confirm-icon">🗑️</div>
        <div class="confirm-title">Delete Contact</div>
        <div class="confirm-msg">Are you sure you want to delete <strong>${esc(name)}</strong>? This cannot be undone.</div>
        <div class="confirm-btns">
            <button class="btn-modal btn-modal-cancel" id="cCancel" style="flex:1">Cancel</button>
            <button class="btn-modal btn-modal-delete" id="cConfirm" style="flex:1">Delete</button>
        </div>
    </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#cCancel').onclick = () => overlay.remove();
            overlay.querySelector('#cConfirm').onclick = () => {
                contacts.splice(idx, 1);
                saveContacts();
                overlay.remove();
                const newIdx = Math.min(currentIdx, contacts.length - 1);
                fullRefresh(newIdx);
            };
        }

        // ── FULL REFRESH ──
        function fullRefresh(targetIdx) {
            currentIdx = Math.max(0, Math.min(targetIdx, contacts.length - 1));
            buildDots();
            buildTable();
            rebuildAssignedChips();
            updateTopbarMeta();
            renderCard();
            updateUI();
        }

        // ── SWIPE ON CARD ──
        let ptStartX = 0, ptStartY = 0, ptActive = false;
        theCard.addEventListener('pointerdown', e => { ptStartX = e.clientX; ptStartY = e.clientY; ptActive = true; });
        document.addEventListener('pointerup', e => {
            if (!ptActive) return;
            const dx = e.clientX - ptStartX, dy = e.clientY - ptStartY;
            if (Math.abs(dx) > 28 || Math.abs(dy) > 28) {
                if (dy < -18 || dx < -28) goNext();
                else if (dy > 18 || dx > 28) goPrev();
            }
            ptActive = false;
        });

        btnNext.addEventListener('click', goNext);
        btnPrev.addEventListener('click', goPrev);

        // ── TABLE DRAG SCROLL ──
        const tableWrap = document.getElementById('tableWrap');
        let mStartX = 0, mScrollLeft = 0, mDragging = false;
        tableWrap.addEventListener('mousedown', e => { mDragging = true; mStartX = e.clientX; mScrollLeft = tableWrap.scrollLeft; tableWrap.style.cursor = 'grabbing'; e.preventDefault(); });
        document.addEventListener('mouseup', () => { mDragging = false; tableWrap.style.cursor = 'grab'; });
        document.addEventListener('mousemove', e => { if (!mDragging) return; tableWrap.scrollLeft = mScrollLeft - (e.clientX - mStartX); });

        // ── INIT ──
        fullRefresh(0);
        window.addEventListener('resize', syncGhosts);
    </script>
</body>

</html>
